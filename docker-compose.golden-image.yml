services:
  db:
    image: postgres:16-alpine
    container_name: etk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expresstrade}
      POSTGRES_USER: ${POSTGRES_USER:-etk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etk_user} -d ${POSTGRES_DB:-expresstrade}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: etk-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      TRUST_PROXY: "true"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-expresstrade}
      DB_USER: ${POSTGRES_USER:-etk_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      LOG_DIR: /app/logs
      FACEBOOK_PIXEL_ID: ${FACEBOOK_PIXEL_ID:-}
      FACEBOOK_ACCESS_TOKEN: ${FACEBOOK_ACCESS_TOKEN:-}
      FACEBOOK_TEST_EVENT_CODE: ${FACEBOOK_TEST_EVENT_CODE:-}
      GREEN_API_INSTANCE_ID: ${GREEN_API_INSTANCE_ID:-}
      GREEN_API_TOKEN: ${GREEN_API_TOKEN:-}
    volumes:
      - api_logs:/app/logs
      - api_uploads:/app/public/uploads
      - api_backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: etk-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - api_uploads:/uploads:ro

volumes:
  postgres_data:
  api_logs:
  api_uploads:
  api_backups:
  caddy_data:
  caddy_config:

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify-frontend:
    name: Verify Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  verify-server:
    name: Verify Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Run test suite
        run: npm test

      - name: Check server syntax
        run: find server/src -name '*.js' -print0 | xargs -0 -n1 node --check

  verify-docker-builds:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    needs:
      - verify-frontend
      - verify-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f server/Dockerfile -t etk-api-ci .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t etk-web-ci .

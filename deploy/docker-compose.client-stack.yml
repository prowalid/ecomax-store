services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expresstrade}
      POSTGRES_USER: ${POSTGRES_USER:-etk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etk_user} -d ${POSTGRES_DB:-expresstrade}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${ETK_API_IMAGE:?ETK_API_IMAGE is required}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      TRUST_PROXY: "true"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-expresstrade}
      DB_USER: ${POSTGRES_USER:-etk_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      LOG_DIR: /app/logs
      FACEBOOK_PIXEL_ID: ${FACEBOOK_PIXEL_ID:-}
      FACEBOOK_ACCESS_TOKEN: ${FACEBOOK_ACCESS_TOKEN:-}
      FACEBOOK_TEST_EVENT_CODE: ${FACEBOOK_TEST_EVENT_CODE:-}
      GREEN_API_INSTANCE_ID: ${GREEN_API_INSTANCE_ID:-}
      GREEN_API_TOKEN: ${GREEN_API_TOKEN:-}
    volumes:
      - api_logs:/app/logs
      - api_uploads:/app/public/uploads
      - api_backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    image: ${ETK_WEB_IMAGE:?ETK_WEB_IMAGE is required}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - api_uploads:/uploads:ro
    networks:
      default:
      edge:
        aliases:
          - ${CLIENT_SLUG:?CLIENT_SLUG is required}-web

volumes:
  postgres_data:
  api_logs:
  api_uploads:
  api_backups:

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-etk-edge}

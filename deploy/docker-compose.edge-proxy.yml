services:
  edge-proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sites:/etc/caddy/sites:ro
      - edge_caddy_data:/data
      - edge_caddy_config:/config
    networks:
      - edge

volumes:
  edge_caddy_data:
  edge_caddy_config:

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-etk-edge}
